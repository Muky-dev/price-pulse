services:
  price-pulse-postgres:
    image: postgres:18
    container_name: price-pulse-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 2s
      retries: 20
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  price-pulse-valkey:
    image: valkey/valkey:latest
    container_name: price-pulse-valkey
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping"]
      interval: 5s
      timeout: 2s
      retries: 20
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
